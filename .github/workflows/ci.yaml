name: CI

on:
  push:
    branches:
      - master

permissions:
  contents: read

env:
  OUT_DIR: output
  PDF_NAME: monografia.pdf

jobs:
  build:
    name: checks ✅
    uses: ./.github/workflows/build.yaml
    concurrency:
      group: build-${{ github.ref }}
      cancel-in-progress: true

  deploy:
    name: deploy 🚀
    needs: [build]
    # ci.yaml so dispara em push na master, entao o deploy sempre publica o PDF.
    runs-on: ubuntu-latest
    concurrency:
      group: pdf-deploy
      cancel-in-progress: false
    permissions:
      contents: write
    steps:
      - name: 🛎️ Checkout code
        uses: actions/checkout@v7
      - name: 📥 Download PDF artifact
        uses: actions/download-artifact@v8
        with:
          # Fonte unica de deploy: o caminho Docker (reproduzivel) roda em todos
          # os repos — no upstream junto aos demais caminhos, no fork como caminho
          # unico. O Linux nativo (`monografia-ubuntu-latest`) so existe no
          # upstream, entao nao serve de fonte comum.
          name: monografia-docker
      - name: 📂 Move PDF to output directory
        run: |
          mkdir -p ${{ env.OUT_DIR }}
          mv ${{ env.PDF_NAME }} ${{ env.OUT_DIR }}
      - name: 🚀 Upload PDF to orphan branch
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: ${{ env.OUT_DIR }}
          branch: pdf
