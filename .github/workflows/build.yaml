name: build

on:
  workflow_call:

permissions:
  contents: read

env:
  OUT_DIR: output
  PDF_NAME: monografia.pdf
  # Dicionarios do hunspell: mesma fonte pinada nos dois SOs, para o resultado do
  # spell ser identico entre Linux e macOS (wooorm/dictionaries: pt -> pt_BR,
  # en -> en_US).
  DICT_REF: 8cfea406b505e4d7df52d5a19bce525df98c54ab

jobs:
  # Fonte unica da matriz de SOs, consumida pelo job `build` via fromJSON.
  # O GitHub Actions nao tem matrix a nivel de workflow nem suporta YAML anchors,
  # entao centralizamos a lista aqui. `container` so eh usado pelo job `build`
  # (Linux roda no container do TeX Live; macOS roda direto no runner).
  setup:
    name: setup ⚙️
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: 🧩 Define OS matrix
        id: matrix
        run: echo 'matrix={"include":[{"os":"ubuntu-latest","container":"texlive/texlive:latest"},{"os":"macos-latest","container":""}]}' >> "$GITHUB_OUTPUT"

  # Analise estatica dos scripts POSIX. Nao depende do toolchain LaTeX, entao roda
  # uma unica vez (Linux) num runner leve. Espelha a parte shellcheck do
  # `just test` (a parte pytest roda no job `build`, que tem o toolchain).
  shellcheck:
    name: shellcheck 🐚
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ Checkout code
        uses: actions/checkout@v7

      - name: 🐚 ShellCheck (scripts POSIX)
        run: shellcheck --shell=sh scripts/main/*.sh

  # Checks de LaTeX + suite pytest + compilacao do PDF. A suite exercita os
  # wrappers (format/lint/spell) e por isso exige o toolchain completo
  # (latexindent, chktex, hunspell) — roda aqui, nos dois SOs. Cada OS publica
  # seu proprio artifact; a branch `pdf` (deploy em ci.yaml) usa so o do Linux.
  build:
    name: build ${{ matrix.os }} 🛠️
    needs: setup
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    steps:
      - name: 🛎️ Checkout code
        uses: actions/checkout@v7

      - name: ⚙️ Install just
        uses: extractions/setup-just@v4

      - name: 📦 Setup TeX Live (macOS)
        if: runner.os == 'macOS'
        uses: TeX-Live/setup-texlive-action@v4
        with:
          package-file: .github/texlive-packages.txt
          cache: true

      - name: 🔧 Install hunspell + python (Linux)
        if: runner.os == 'Linux'
        run: apt-get update && apt-get install -y --no-install-recommends hunspell curl python3 python3-pip

      - name: 🔧 Install hunspell (macOS)
        if: runner.os == 'macOS'
        run: brew install hunspell

      - name: 🔤 Fetch hunspell dictionaries (pinned, same on both OSes)
        run: |
          set -eu
          dir="$HOME/hunspell-dicts"
          mkdir -p "$dir"
          base="https://raw.githubusercontent.com/wooorm/dictionaries/${DICT_REF}/dictionaries"
          curl -fsSL "$base/pt/index.aff" -o "$dir/pt_BR.aff"
          curl -fsSL "$base/pt/index.dic" -o "$dir/pt_BR.dic"
          curl -fsSL "$base/en/index.aff" -o "$dir/en_US.aff"
          curl -fsSL "$base/en/index.dic" -o "$dir/en_US.dic"
          echo "DICPATH=$dir" >> "$GITHUB_ENV"

      - name: 🐍 Install pytest (deps do harness)
        run: python3 -m pip install --break-system-packages -r scripts/test/requirements.txt

      - name: 🧹 Check LaTeX formatting
        run: just format-check

      - name: 🔎 Lint LaTeX (chktex)
        run: just lint

      - name: 🔤 Spellcheck (hunspell)
        run: just spell

      - name: 🧪 Test scripts (pytest)
        run: python3 -m pytest scripts/test

      - name: 📜 Build PDF
        run: just pdf

      - name: 📤 Upload PDF artifact
        uses: actions/upload-artifact@v7
        with:
          name: monografia-${{ matrix.os }}
          path: ${{ env.OUT_DIR }}/${{ env.PDF_NAME }}
