name: build

on:
  workflow_call:

permissions:
  contents: read

env:
  OUT_DIR: output
  PDF_NAME: monografia.pdf

jobs:
  # Todas as checagens + compilacao do PDF, nos tres SOs nativos. A suite
  # (`just test`) exercita os wrappers (format/lint/spell) e faz shellcheck,
  # entao exige o toolchain completo (latexindent, chktex, hunspell, shellcheck)
  # — por isso tudo roda num job so. Os steps de setup vem primeiro; as
  # checagens, depois. Cada OS publica seu proprio artifact; a branch `pdf`
  # (deploy em ci.yaml) usa so o do Docker. Nos tres SOs rodamos direto no runner
  # (a instalacao do TeX Live e feita pela setup-texlive-action). So no upstream
  # (`IS_TEMPLATE_REPO`): no fork o caminho unico e o job `docker` (reproduzivel),
  # nao o Linux nativo.
  build:
    name: build ${{ matrix.os }} 🛠️
    if: vars.IS_TEMPLATE_REPO == 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      # --- Setup ---
      - name: 🛎️ Checkout code
        uses: actions/checkout@v7

      - name: ⚙️ Install just
        uses: extractions/setup-just@v4

      - name: 📦 Setup TeX Live
        uses: TeX-Live/setup-texlive-action@v4
        with:
          package-file: .github/texlive-packages.txt
          cache: true

      # No Linux os dicionarios vem dos pacotes hunspell-pt-br/hunspell-en-us
      # (em /usr/share/hunspell, achados sem DICPATH); no macOS o Homebrew nao os
      # empacota, entao baixamos do LibreOffice/dictionaries e apontamos DICPATH.
      # O en_US diverge entre as fontes (SCOWL no apt vs LibreOffice no macOS):
      # palavra so conhecida por um lado entra em dictionary.txt.
      - name: 🔧 Install tooling (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            hunspell hunspell-pt-br hunspell-en-us shellcheck

      - name: 🔧 Install tooling (macOS)
        if: runner.os == 'macOS'
        run: brew install hunspell shellcheck

      # No Windows o hunspell vem do winget (FSFhu.Hunspell); o diretorio de
      # shims/binarios do WinGet entra no PATH para os steps seguintes.
      - name: 🔧 Install hunspell (Windows)
        if: runner.os == 'Windows'
        run: |
          winget install --id FSFhu.Hunspell --exact --silent `
            --accept-source-agreements --accept-package-agreements
          "$env:LOCALAPPDATA\Microsoft\WinGet\Links" >> $env:GITHUB_PATH

      - name: 🔤 Install latexindent Perl deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cpanminus
          cpanm --notest YAML::Tiny File::HomeDir

      - name: 🔤 Fetch hunspell dictionaries (macOS)
        if: runner.os == 'macOS'
        run: |
          set -eu
          dir="$HOME/hunspell-dicts"
          mkdir -p "$dir"
          base="https://raw.githubusercontent.com/LibreOffice/dictionaries/master"
          curl -fsSL "$base/pt_BR/pt_BR.aff" -o "$dir/pt_BR.aff"
          curl -fsSL "$base/pt_BR/pt_BR.dic" -o "$dir/pt_BR.dic"
          curl -fsSL "$base/en/en_US.aff" -o "$dir/en_US.aff"
          curl -fsSL "$base/en/en_US.dic" -o "$dir/en_US.dic"
          echo "DICPATH=$dir" >> "$GITHUB_ENV"

      # Mesmo approach do macOS: o winget nao empacota os dicionarios, entao os
      # baixamos do LibreOffice/dictionaries e apontamos DICPATH (sintaxe pwsh).
      - name: 🔤 Fetch hunspell dictionaries (Windows)
        if: runner.os == 'Windows'
        run: |
          $dir = "$env:USERPROFILE\hunspell-dicts"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          $base = "https://raw.githubusercontent.com/LibreOffice/dictionaries/master"
          Invoke-WebRequest "$base/pt_BR/pt_BR.aff" -OutFile "$dir\pt_BR.aff"
          Invoke-WebRequest "$base/pt_BR/pt_BR.dic" -OutFile "$dir\pt_BR.dic"
          Invoke-WebRequest "$base/en/en_US.aff" -OutFile "$dir\en_US.aff"
          Invoke-WebRequest "$base/en/en_US.dic" -OutFile "$dir\en_US.dic"
          "DICPATH=$dir" >> $env:GITHUB_ENV

      - name: 🐍 Install pytest (Unix)
        if: runner.os != 'Windows'
        run: python3 -m pip install --break-system-packages -r scripts/test/requirements.txt

      - name: 🐍 Install pytest (Windows)
        if: runner.os == 'Windows'
        run: python -m pip install -r scripts/test/requirements.txt

      # --- Checagens ---
      - name: 🧪 Test scripts
        run: just test

      - name: 🧹 Check LaTeX formatting
        run: just format-check

      - name: 🔎 Lint LaTeX
        run: just lint

      - name: 🔤 Spellcheck
        run: just spell

      - name: 📜 Build PDF
        run: just pdf

      - name: 📤 Upload PDF artifact
        uses: actions/upload-artifact@v7
        with:
          name: monografia-${{ matrix.os }}
          path: ${{ env.OUT_DIR }}/${{ env.PDF_NAME }}

  # Caminho Docker: roda o MESMO conjunto de checagens que o job `build` (native),
  # so que dentro da imagem custom do Dockerfile. Job separado (nao entra na
  # matrix): o setup e totalmente diferente (buildar a imagem vs. instalar
  # toolchain no runner) e os checks sao prefixados por `docker compose run`. So
  # no Linux. Roda em TODOS os repos: no upstream e um dos varios caminhos; no
  # fork e o caminho UNICO (reproduzivel), no lugar do Linux nativo. Por isso, ao
  # contrario dos jobs `nix`/nativo-multiplataforma, nao tem gating por
  # `IS_TEMPLATE_REPO`. E tambem a fonte do PDF de deploy (ver ci.yaml).
  docker:
    name: build docker 🐳
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ Checkout code
        uses: actions/checkout@v7

      # Builda a imagem custom e a carrega no daemon local; `docker compose run` a
      # reusa sem rebuild. Cache `type=gha` acelera runs subsequentes.
      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: 🐳 Build image (bake + gha cache)
        run: |
          docker buildx bake \
            --set tcc.cache-from=type=gha \
            --set tcc.cache-to=type=gha,mode=max \
            --load

      # UID/GID do host para os artefatos nao sairem como root (o compose
      # interpola ${UID}/${GID}). Nao dá pra passar `UID=.. docker ...` inline:
      # no bash `UID` e readonly.
      - name: 🧰 Export host UID/GID
        run: |
          {
            echo "UID=$(id -u)"
            echo "GID=$(id -g)"
          } >> "$GITHUB_ENV"

      # --- Checagens (mesmos alvos do job native, via docker compose run) ---
      - name: 🧪 Test scripts
        run: docker compose run --rm tcc just test

      - name: 🧹 Check LaTeX formatting
        run: docker compose run --rm tcc just format-check

      - name: 🔎 Lint LaTeX
        run: docker compose run --rm tcc just lint

      - name: 🔤 Spellcheck
        run: docker compose run --rm tcc just spell

      - name: 📜 Build PDF
        run: docker compose run --rm tcc just pdf

      - name: 📤 Upload PDF artifact
        uses: actions/upload-artifact@v7
        with:
          name: monografia-docker
          path: ${{ env.OUT_DIR }}/${{ env.PDF_NAME }}

  # Caminho Nix: roda o MESMO conjunto de checagens que o job `build` (native),
  # so que dentro do devShell do flake (`nix develop -c ...`). Job separado (nao
  # entra na matrix): o setup e totalmente diferente (instalar Nix + restaurar o
  # /nix/store vs. instalar toolchain no runner) e os checks sao prefixados por
  # `nix develop -c`. So no Linux (o Nix roda nativo so em Linux/macOS; o devShell
  # e reproduzivel por lockfile) e so no upstream (`IS_TEMPLATE_REPO`), para nao
  # pesar o CI dos forks. O DICPATH vem do shellHook do flake, entao nao precisa
  # de setup de dicionarios como nos caminhos nativos.
  nix:
    name: build nix ❄️
    if: vars.IS_TEMPLATE_REPO == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: 🛎️ Checkout code
        uses: actions/checkout@v7

      - name: ❄️ Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          determinate: false

      # Cache do /nix/store via cache do GitHub Actions (mesma infra do `type=gha`
      # do job docker, sem servico externo). Chave pelo hash do flake.lock: invalida
      # sozinha quando o pin muda. O GC antes de salvar (`gc-max-store-size`) limita
      # o tamanho do cache, analogo ao `mode=max` do bake.
      - name: ❄️ Restore and save Nix store
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('flake.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 5G

      # --- Checagens (mesmos alvos do job native, dentro do devShell) ---
      - name: 🧪 Test scripts
        run: nix develop -c just test

      - name: 🧹 Check LaTeX formatting
        run: nix develop -c just format-check

      - name: 🔎 Lint LaTeX
        run: nix develop -c just lint

      - name: 🔤 Spellcheck
        run: nix develop -c just spell

      - name: 📜 Build PDF
        run: nix develop -c just pdf

      - name: ❄️ Hermetic build (nix build)
        run: |
          nix build .
          test -f result/monografia.pdf

      - name: 📤 Upload PDF artifact
        uses: actions/upload-artifact@v7
        with:
          name: monografia-nix
          path: ${{ env.OUT_DIR }}/${{ env.PDF_NAME }}
