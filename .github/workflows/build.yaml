name: build

on:
  workflow_call:

permissions:
  contents: read

env:
  OUT_DIR: output
  PDF_NAME: monografia.pdf
  # Dicionarios do hunspell: mesma fonte pinada nos dois SOs, para o resultado do
  # spell ser identico entre Linux e macOS (wooorm/dictionaries: pt -> pt_BR,
  # en -> en_US).
  DICT_REF: 8cfea406b505e4d7df52d5a19bce525df98c54ab

jobs:
  # Todas as checagens + compilacao do PDF, nos dois SOs. A suite (`just test`)
  # exercita os wrappers (format/lint/spell) e faz shellcheck, entao exige o
  # toolchain completo (latexindent, chktex, hunspell, shellcheck) — por isso
  # tudo roda num job so. Os steps de setup vem primeiro; as checagens, depois.
  # Cada OS publica seu proprio artifact; a branch `pdf` (deploy em ci.yaml) usa
  # so o do Linux. No Linux rodamos no container do TeX Live; no macOS, direto no
  # runner (a instalacao do TeX Live e feita pela setup-texlive-action).
  build:
    name: build ${{ matrix.os }} 🛠️
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            container: texlive/texlive:latest
          - os: macos-latest
            container: ''
    steps:
      # --- Setup ---
      - name: 🛎️ Checkout code
        uses: actions/checkout@v7

      - name: ⚙️ Install just
        uses: extractions/setup-just@v4

      - name: 📦 Setup TeX Live (macOS)
        if: runner.os == 'macOS'
        uses: TeX-Live/setup-texlive-action@v4
        with:
          package-file: .github/texlive-packages.txt
          cache: true

      - name: 🔧 Install tooling (Linux)
        if: runner.os == 'Linux'
        run: apt-get update && apt-get install -y --no-install-recommends hunspell curl python3 python3-pip shellcheck

      - name: 🔧 Install tooling (macOS)
        if: runner.os == 'macOS'
        run: brew install hunspell shellcheck

      - name: 🔧 Install latexindent Perl deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cpanminus
          cpanm --notest YAML::Tiny File::HomeDir

      - name: 🔤 Refresh TeX filename database (macOS)
        if: runner.os == 'macOS'
        run: mktexlsr

      - name: 🔤 Fetch hunspell dictionaries (pinned, same on both OSes)
        run: |
          set -eu
          dir="$HOME/hunspell-dicts"
          mkdir -p "$dir"
          base="https://raw.githubusercontent.com/wooorm/dictionaries/${DICT_REF}/dictionaries"
          curl -fsSL "$base/pt/index.aff" -o "$dir/pt_BR.aff"
          curl -fsSL "$base/pt/index.dic" -o "$dir/pt_BR.dic"
          curl -fsSL "$base/en/index.aff" -o "$dir/en_US.aff"
          curl -fsSL "$base/en/index.dic" -o "$dir/en_US.dic"
          echo "DICPATH=$dir" >> "$GITHUB_ENV"

      - name: 🐍 Install pytest (deps do harness)
        run: python3 -m pip install --break-system-packages -r scripts/test/requirements.txt

      # --- Checagens ---
      - name: 🧹 Check LaTeX formatting
        run: just format-check

      - name: 🔎 Lint LaTeX (chktex)
        run: just lint

      - name: 🔤 Spellcheck (hunspell)
        run: just spell

      - name: 🧪 Test scripts (shellcheck + pytest)
        run: just test

      - name: 📜 Build PDF
        run: just pdf

      - name: 📤 Upload PDF artifact
        uses: actions/upload-artifact@v7
        with:
          name: monografia-${{ matrix.os }}
          path: ${{ env.OUT_DIR }}/${{ env.PDF_NAME }}
