name: build

on:
  workflow_call:

permissions:
  contents: read

env:
  OUT_DIR: output
  PDF_NAME: monografia.pdf

jobs:
  # Todas as checagens + compilacao do PDF, nos tres SOs. A suite (`just test`)
  # exercita os wrappers (format/lint/spell) e faz shellcheck, entao exige o
  # toolchain completo (latexindent, chktex, hunspell, shellcheck) — por isso
  # tudo roda num job so. Os steps de setup vem primeiro; as checagens, depois.
  # Cada OS publica seu proprio artifact; a branch `pdf` (deploy em ci.yaml) usa
  # so o do Linux. No Linux rodamos no container do TeX Live; no macOS e Windows,
  # direto no runner (a instalacao do TeX Live e feita pela setup-texlive-action).
  build:
    name: build ${{ matrix.os }} 🛠️
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            container: texlive/texlive:latest
          - os: macos-latest
            container: ''
          - os: windows-latest
            container: ''
    steps:
      # --- Setup ---
      - name: 🛎️ Checkout code
        uses: actions/checkout@v7

      - name: ⚙️ Install just
        uses: extractions/setup-just@v4

      - name: 📦 Setup TeX Live (macOS/Windows)
        if: runner.os != 'Linux'
        uses: TeX-Live/setup-texlive-action@v4
        with:
          package-file: .github/texlive-packages.txt
          cache: true

      # No Linux os dicionarios vem dos pacotes hunspell-pt-br/hunspell-en-us
      # (em /usr/share/hunspell, achados sem DICPATH); no macOS o Homebrew nao os
      # empacota, entao baixamos do LibreOffice/dictionaries e apontamos DICPATH.
      # O en_US diverge entre as fontes (SCOWL no apt vs LibreOffice no macOS):
      # palavra so conhecida por um lado entra em dictionary.txt.
      - name: 🔧 Install tooling (Linux)
        if: runner.os == 'Linux'
        run: apt-get update && apt-get install -y --no-install-recommends hunspell hunspell-pt-br hunspell-en-us curl python3 python3-pip shellcheck

      - name: 🔧 Install tooling (macOS)
        if: runner.os == 'macOS'
        run: brew install hunspell shellcheck

      # No Windows o hunspell vem do winget (FSFhu.Hunspell); o diretorio de
      # shims/binarios do WinGet entra no PATH para os steps seguintes.
      - name: 🔧 Install hunspell (Windows)
        if: runner.os == 'Windows'
        run: |
          winget install --id FSFhu.Hunspell --exact --silent `
            --accept-source-agreements --accept-package-agreements
          "$env:LOCALAPPDATA\Microsoft\WinGet\Links" >> $env:GITHUB_PATH

      - name: 🔤 Install latexindent Perl deps (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cpanminus
          cpanm --notest YAML::Tiny File::HomeDir

      - name: 🔤 Fetch hunspell dictionaries (macOS)
        if: runner.os == 'macOS'
        run: |
          set -eu
          dir="$HOME/hunspell-dicts"
          mkdir -p "$dir"
          base="https://raw.githubusercontent.com/LibreOffice/dictionaries/master"
          curl -fsSL "$base/pt_BR/pt_BR.aff" -o "$dir/pt_BR.aff"
          curl -fsSL "$base/pt_BR/pt_BR.dic" -o "$dir/pt_BR.dic"
          curl -fsSL "$base/en/en_US.aff" -o "$dir/en_US.aff"
          curl -fsSL "$base/en/en_US.dic" -o "$dir/en_US.dic"
          echo "DICPATH=$dir" >> "$GITHUB_ENV"

      # Mesmo approach do macOS: o winget nao empacota os dicionarios, entao os
      # baixamos do LibreOffice/dictionaries e apontamos DICPATH (sintaxe pwsh).
      - name: 🔤 Fetch hunspell dictionaries (Windows)
        if: runner.os == 'Windows'
        run: |
          $dir = "$env:USERPROFILE\hunspell-dicts"
          New-Item -ItemType Directory -Force -Path $dir | Out-Null
          $base = "https://raw.githubusercontent.com/LibreOffice/dictionaries/master"
          Invoke-WebRequest "$base/pt_BR/pt_BR.aff" -OutFile "$dir\pt_BR.aff"
          Invoke-WebRequest "$base/pt_BR/pt_BR.dic" -OutFile "$dir\pt_BR.dic"
          Invoke-WebRequest "$base/en/en_US.aff" -OutFile "$dir\en_US.aff"
          Invoke-WebRequest "$base/en/en_US.dic" -OutFile "$dir\en_US.dic"
          "DICPATH=$dir" >> $env:GITHUB_ENV

      - name: 🐍 Install pytest (deps do harness, unix)
        if: runner.os != 'Windows'
        run: python3 -m pip install --break-system-packages -r scripts/test/requirements.txt

      - name: 🐍 Install pytest (deps do harness, Windows)
        if: runner.os == 'Windows'
        run: python -m pip install -r scripts/test/requirements.txt

      # --- Checagens ---
      - name: 🧹 Check LaTeX formatting
        run: just format-check

      - name: 🔎 Lint LaTeX (chktex)
        run: just lint

      - name: 🔤 Spellcheck (hunspell)
        run: just spell

      - name: 🧪 Test scripts (shellcheck + pytest)
        run: just test

      - name: 📜 Build PDF
        run: just pdf

      - name: 📤 Upload PDF artifact
        uses: actions/upload-artifact@v7
        with:
          name: monografia-${{ matrix.os }}
          path: ${{ env.OUT_DIR }}/${{ env.PDF_NAME }}
